name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    name: Build Linux binaries and packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          install: true
          experimental: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Linux release artifacts
        run: mise run package:linux

      - name: Stage Linux release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets

          cp dist/matchlock_linux_amd64_*/matchlock release-assets/matchlock-linux-amd64
          cp dist/matchlock_linux_arm64_*/matchlock release-assets/matchlock-linux-arm64
          cp dist/guest-init_linux_amd64_*/guest-init release-assets/guest-init-linux-amd64
          cp dist/guest-init_linux_arm64_*/guest-init release-assets/guest-init-linux-arm64
          cp dist/*.deb release-assets/
          cp dist/*.rpm release-assets/
          cp dist/checksums.txt release-assets/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-artifacts
          path: |
            release-assets/*

  build-darwin:
    name: Build macOS (arm64)
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          install: true
          experimental: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build macOS CLI (arm64, CGO for Virtualization.framework)
        run: mise run cross-build:darwin

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: darwin-arm64-binaries
          path: bin/matchlock-darwin-arm64

  release:
    name: Create GitHub Release
    needs: [build-linux, build-darwin]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: bin/
          merge-multiple: true

      - name: Create GitHub Release
        run: |
          chmod +x bin/*
          NOTES_FILE="$(mktemp)"
          bash ./scripts/extract-release-notes.sh > "$NOTES_FILE"
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file "$NOTES_FILE" \
            bin/matchlock-linux-amd64 \
            bin/matchlock-linux-arm64 \
            bin/matchlock-darwin-arm64 \
            bin/guest-init-linux-amd64 \
            bin/guest-init-linux-arm64 \
            bin/*.deb \
            bin/*.rpm \
            bin/checksums.txt
          rm -f "$NOTES_FILE"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
